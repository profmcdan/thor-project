events {
    worker_connections 4096;
}

http {
    upstream backend_servers {
        server dotnet-api:8000 max_fails=3 fail_timeout=5s;
        
        # Keep up to 32 idle connections open to each backend replica
        keepalive 32;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend_servers;
            
            # Enable HTTP/1.1 and clear Connection header to support keepalive
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Enable retry/failover on next healthy upstream server
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;
            
            # Increase timeouts slightly for slow cloud DB transactions
            proxy_connect_timeout 15s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }
}
